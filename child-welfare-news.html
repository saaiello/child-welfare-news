<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Child Welfare News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --border: #E2DED6;
      --border-strong: #C8C3B8;
      --text-primary: #1A1814;
      --text-secondary: #6B6760;
      --text-tertiary: #9E9B96;
      --accent: #1D4E7A;
      --accent-light: #E6EFF7;
      --accent-border: #9DBDD9;
      --tag-active-bg: #E6EFF7;
      --tag-active-text: #1D4E7A;
      --tag-active-border: #9DBDD9;
      --badge-bg: #EEF4FA;
      --badge-text: #1D4E7A;
      --badge-border: #B5CDE0;
      --success-bg: #EAF3DE;
      --success-text: #3B6D11;
      --success-border: #639922;
      --warn-bg: #FAEEDA;
      --warn-text: #854F0B;
      --warn-border: #BA7517;
      --error-bg: #FAECE7;
      --error-text: #993C1D;
      --error-border: #D85A30;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18171A;
        --surface: #222128;
        --border: #333038;
        --border-strong: #4A4750;
        --text-primary: #F0EDE8;
        --text-secondary: #A09D98;
        --text-tertiary: #6B6760;
        --accent: #7BAACC;
        --accent-light: #1A2A38;
        --accent-border: #2E4A60;
        --tag-active-bg: #1A2A38;
        --tag-active-text: #7BAACC;
        --tag-active-border: #2E4A60;
        --badge-bg: #1A2A38;
        --badge-text: #7BAACC;
        --badge-border: #2E4A60;
        --success-bg: #1A2E10;
        --success-text: #97C459;
        --success-border: #3B6D11;
        --warn-bg: #2A1E08;
        --warn-text: #EF9F27;
        --warn-border: #854F0B;
        --error-bg: #2A1008;
        --error-text: #F0997B;
        --error-border: #993C1D;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout */
    .page { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    /* Masthead */
    .masthead {
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 0 2rem;
      margin-bottom: 2rem;
    }
    .masthead-inner { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
    .masthead-title {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .masthead-date {
      font-size: 13px;
      color: var(--text-tertiary);
      text-align: right;
    }
    .masthead-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
      max-width: 520px;
    }

    /* Search */
    .search-section { margin-bottom: 1.25rem; }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      height: 42px;
      padding: 0 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-tertiary); }

    .search-btn {
      height: 42px;
      padding: 0 20px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .search-btn:hover { opacity: 0.88; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Topic tags */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.5rem;
    }
    .tag {
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tag:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .tag.active {
      background: var(--tag-active-bg);
      border-color: var(--tag-active-border);
      color: var(--tag-active-text);
      font-weight: 500;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-count { font-size: 13px; color: var(--text-secondary); }
    .api-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      font-weight: 500;
    }
    .api-pill.live { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
    .api-pill.loading { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
    .api-pill.error { background: var(--error-bg); color: var(--error-text); border-color: var(--error-border); }

    /* Sort */
    .sort-select {
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      outline: none;
    }

    /* Article grid */
    .article-grid { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

    .article-card {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      cursor: pointer;
    }
    .article-card:last-child { border-bottom: none; }
    .article-card:hover { background: var(--accent-light); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .source-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--badge-bg);
      color: var(--badge-text);
      border: 1px solid var(--badge-border);
    }
    .topic-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: transparent;
      color: var(--text-tertiary);
      border: 1px solid var(--border);
    }
    .card-date { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }

    .card-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.45;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-link {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
    .card-link:hover { text-decoration: underline; }

    /* States */
    .state-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .state-box p { margin-top: 8px; font-size: 13px; color: var(--text-tertiary); }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 600px) {
      .masthead-title { font-size: 28px; }
      .masthead-inner { flex-direction: column; align-items: flex-start; }
      .masthead-date { text-align: left; }
      .article-card { padding: 1rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div class="masthead-inner">
      <div>
        <h1 class="masthead-title">Child Welfare News</h1>
        <p class="masthead-desc">Latest news, research, and policy updates across the child welfare ecosystem</p>
      </div>
      <div class="masthead-date" id="todayDate"></div>
    </div>
  </header>

  <div class="search-section">
    <div class="search-row">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder='Search — e.g. "foster care reform" or "family treatment court"'
        autocomplete="off"
      />
      <button class="search-btn" id="searchBtn" onclick="runSearch()">Search</button>
    </div>
  </div>

  <div class="tag-row" id="tagRow"></div>

  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="results-count" id="resultsCount"></span>
      <span class="api-pill loading" id="apiPill">Loading...</span>
    </div>
    <select class="sort-select" id="sortSelect" onchange="renderArticles()">
      <option value="date">Most recent</option>
      <option value="relevance">By topic</option>
    </select>
  </div>

  <div id="articleGrid"></div>

  <footer class="footer">
    <span>Child Welfare News — powered by GNews</span>
    <span id="footerUpdate"></span>
  </footer>

</div>

<script>
  const API_KEY = "92964dfef8d957bf56e23ee2e3c3a354";
  const BASE_URL = "https://gnews.io/api/v4/search";

  const TOPICS = [
    { label: "All", query: "child welfare" },
    { label: "Foster care", query: "foster care children" },
    { label: "Family preservation", query: "family preservation reunification" },
    { label: "Substance use", query: "substance use disorder families child welfare" },
    { label: "Family treatment court", query: "family treatment court" },
    { label: "Adoption", query: "adoption foster care" },
    { label: "Kinship care", query: "kinship care relative caregiver" },
    { label: "Child abuse & neglect", query: "child abuse neglect prevention" },
    { label: "Policy & legislation", query: "child welfare policy legislation" },
    { label: "Mental health", query: "child welfare mental health youth" },
    { label: "Racial equity", query: "racial equity child welfare disparity" },
    { label: "Research", query: "child welfare research outcomes evidence" },
  ];

  let activeTag = "All";
  let articles = [];
  let lastFetched = null;

  function setDate() {
    const now = new Date();
    document.getElementById("todayDate").textContent = now.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  }

  function buildTags() {
    const row = document.getElementById("tagRow");
    row.innerHTML = "";
    TOPICS.forEach(t => {
      const el = document.createElement("button");
      el.className = "tag" + (t.label === activeTag ? " active" : "");
      el.textContent = t.label;
      el.onclick = () => { activeTag = t.label; buildTags(); runSearch(); };
      row.appendChild(el);
    });
  }

  function getQuery() {
    const manual = document.getElementById("searchInput").value.trim();
    if (manual) return manual;
    const topic = TOPICS.find(t => t.label === activeTag);
    return topic ? topic.query : "child welfare";
  }

  async function runSearch() {
    const btn = document.getElementById("searchBtn");
    const pill = document.getElementById("apiPill");
    const grid = document.getElementById("articleGrid");
    const count = document.getElementById("resultsCount");

    btn.disabled = true;
    pill.textContent = "Fetching...";
    pill.className = "api-pill loading";
    grid.innerHTML = '<div class="state-box"><div class="spinner"></div>Loading articles...</div>';
    count.textContent = "";

    const q = getQuery();

    try {
      const res = await fetch(`${BASE_URL}?q=${encodeURIComponent(q)}&lang=en&country=us&max=10&sortby=publishedAt&apikey=${API_KEY}`);
      const data = await res.json();

      if (data.errors || !data.articles) {
        pill.textContent = "API error";
        pill.className = "api-pill error";
        grid.innerHTML = '<div class="state-box">Could not load articles. Check your API key or try again later.<p>Visit gnews.io to verify your account.</p></div>';
        btn.disabled = false;
        return;
      }

      articles = data.articles.map(a => ({
        title: a.title || "Untitled",
        source: a.source?.name || "Unknown source",
        topic: activeTag !== "All" ? activeTag : inferTopic(a.title + " " + (a.description || "")),
        date: a.publishedAt ? a.publishedAt.slice(0, 10) : "",
        desc: a.description || "",
        url: a.url || "#",
        image: a.image || null,
      }));

      lastFetched = new Date();
      pill.textContent = "Live";
      pill.className = "api-pill live";
      document.getElementById("footerUpdate").textContent = "Updated " + lastFetched.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      renderArticles();

    } catch (e) {
      pill.textContent = "Network error";
      pill.className = "api-pill error";
      grid.innerHTML = '<div class="state-box">Network error. Check your connection and try again.</div>';
    }

    btn.disabled = false;
  }

  function inferTopic(text) {
    const t = text.toLowerCase();
    if (t.includes("foster")) return "Foster care";
    if (t.includes("adoption") || t.includes("adopt")) return "Adoption";
    if (t.includes("kinship") || t.includes("relative caregiver")) return "Kinship care";
    if (t.includes("substance") || t.includes("opioid") || t.includes("treatment court")) return "Substance use";
    if (t.includes("family treatment court") || t.includes("ftc")) return "Family treatment court";
    if (t.includes("abuse") || t.includes("neglect")) return "Child abuse & neglect";
    if (t.includes("mental health") || t.includes("behavioral health")) return "Mental health";
    if (t.includes("legislat") || t.includes("policy") || t.includes("bill") || t.includes("congress")) return "Policy & legislation";
    if (t.includes("racial") || t.includes("disparity") || t.includes("equity")) return "Racial equity";
    if (t.includes("research") || t.includes("study") || t.includes("outcomes")) return "Research";
    if (t.includes("preserv") || t.includes("reunif")) return "Family preservation";
    return "General";
  }

  function renderArticles() {
    const grid = document.getElementById("articleGrid");
    const count = document.getElementById("resultsCount");
    const sort = document.getElementById("sortSelect").value;

    let sorted = [...articles];
    if (sort === "date") {
      sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
    } else {
      sorted.sort((a, b) => a.topic.localeCompare(b.topic));
    }

    count.textContent = sorted.length === 0 ? "No results" : `${sorted.length} article${sorted.length !== 1 ? "s" : ""}`;

    if (sorted.length === 0) {
      grid.innerHTML = '<div class="state-box">No articles found for this search.<p>Try different keywords or select a topic above.</p></div>';
      return;
    }

    grid.innerHTML = '<div class="article-grid">' + sorted.map(a => `
      <div class="article-card" onclick="window.open('${escHtml(a.url)}', '_blank')">
        <div class="card-meta">
          <span class="source-badge">${escHtml(a.source)}</span>
          <span class="topic-pill">${escHtml(a.topic)}</span>
          <span class="card-date">${formatDate(a.date)}</span>
        </div>
        <p class="card-title">${escHtml(a.title)}</p>
        ${a.desc ? `<p class="card-desc">${escHtml(a.desc)}</p>` : ""}
        <a class="card-link" href="${escHtml(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read full article →</a>
      </div>
    `).join("") + '</div>';
  }

  function formatDate(d) {
    if (!d) return "";
    return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") runSearch();
  });

  setDate();
  buildTags();
  runSearch();
</script>
</body>
</html>
