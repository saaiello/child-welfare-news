<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webinars — Child Welfare News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="announce-bar">
  Stay current on child welfare news — bookmark this site
</div>

<header class="masthead">
  <div class="masthead-inner">
    <a href="index.html" style="text-decoration:none;">
      <div class="masthead-logo">child welfare news <span>+ more</span></div>
    </a>
    <nav class="masthead-nav">
      <a class="nav-link" href="index.html#today">Today</a>
      <a class="nav-link" href="webinars.html" style="color:var(--teal);font-weight:600;">Webinars</a>
      <a class="nav-link" href="podcasts.html">Podcasts</a>
      <a class="nav-link" href="index.html#research">Research</a>
      <a class="nav-link" href="index.html#articles">All Articles</a>
      <a class="nav-link" href="index.html">← Back to main site</a>
    </nav>
  </div>
</header>

<div class="page">

  <!-- MINI HERO -->
  <div id="webinarHero"></div>

  <!-- SEARCH + TOPIC TAGS -->
  <div class="webinar-search-section">
    <div class="webinar-search-row">
      <input type="text" class="webinar-search-input" id="webinarSearch" placeholder="Search webinars by title or description…" autocomplete="off" />
      <button class="webinar-search-btn" onclick="applyFilters()">Search</button>
    </div>
    <div class="webinar-topic-tags" id="topicTags"></div>
  </div>

  <!-- WEBINAR LIST -->
  <div class="webinar-list-header">
    <div class="webinar-list-title">All Webinars</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="webinar-type-filter active" id="filterAll" onclick="filterByType('all')">All</button>
      <button class="webinar-type-filter" id="filterUpcoming" onclick="filterByType('upcoming')">Upcoming</button>
      <button class="webinar-type-filter" id="filterRecorded" onclick="filterByType('recorded')">Recorded</button>
      <span class="webinar-count" id="webinarCount"></span>
    </div>
  </div>

  <div id="webinarGrid"></div>
  <div class="pagination" id="webinarPagination"></div>

  <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);">
    <a class="digest-see-all" href="index.html#missing">Submit a webinar →</a>
  </div>

</div>

<footer class="site-footer">
  <span>Child Welfare News — Webinars</span>
  <div class="footer-links">
    <a href="index.html">Main Site</a>
  </div>
  <span id="footerUpdate"></span>
</footer>

<script src="js/utils.js"></script>
<script src="js/webinars.js"></script>
</body>
</html>
